<script>

    window.addEventListener("message", function (event) {
        const msg = event.data;
        if (msg.type === "highlight_train") {
            highlightRoute(msg.train);
        }
        if (msg.type === "Travel Duration") {
            highlightDuration(msg.start, msg.end);
        }
        if (msg.type === "Travel Distance") {
            highlightDistance(msg.start, msg.end);
        }
        if (msg.type === "highlight_station") {
            highlightStation(msg.station);
        }
    });
    function highlightStation(station) {
        map_3d3730b4921087c1daf493c70e68e0f5.eachLayer(function (layer) {
            if (layer.feature) {
                if (layer.feature.properties.from === station || layer.feature.properties.to === station) {
                    layer.setStyle({
                        color: "red",
                        weight: 6,
                        opacity: 0.7
                    });
                }
                else {
                    layer.setStyle({
                        color: "blue",
                        weight: 3,
                        opacity: 0.2
                    });
                };
            }
        });
    }
    function highlightDistance(start, end) {
        map_3d3730b4921087c1daf493c70e68e0f5.eachLayer(function (layer) {
            if (layer.feature) {
                if (layer.feature.properties.distance >= start && layer.feature.properties.distance < end) {
                    layer.setStyle({
                        color: "red",
                        weight: 6,
                        opacity: 0.7
                    });
                }
                else {
                    layer.setStyle({
                        color: "blue",
                        weight: 3,
                        opacity: 0.2
                    });
                };
            }
        });
    }
    function highlightDuration(start, end) {
        map_3d3730b4921087c1daf493c70e68e0f5.eachLayer(function (layer) {
            if (layer.feature) {
                if (layer.feature.properties.duration >= start && layer.feature.properties.duration < end) {
                    layer.setStyle({
                        color: "red",
                        weight: 6,
                        opacity: 0.7
                    });
                }
                else {
                    layer.setStyle({
                        color: "blue",
                        weight: 3,
                        opacity: 0.2
                    });
                };
            }
        });
    }
    function highlightRoute(train) {

        map_3d3730b4921087c1daf493c70e68e0f5.eachLayer(function (layer) {
            if (layer.feature) {
                if (layer.feature.properties.id === train) {
                    layer.setStyle({
                        color: "red",
                        weight: 6,
                        opacity: 1
                    });
                }
                else {
                    layer.setStyle({
                        color: "blue",
                        weight: 3,
                        opacity: 0.2
                    });
                };
            } 
        });
    }
    

</script>
