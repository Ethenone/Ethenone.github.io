            max-width: 100%;

            transition: width 0.25s ease;

            flex-direction: column;

        #toggleBtn {
            position: absolute;

            border-radius: 12px;

            border: 1px solid #aaa;

            font-size: 12px;
        }

        #divider {
            width: 6px;
            cursor: col-resize;
            background: #ddd;
        }

            #divider:hover {
                background: #bbb;
            }

        /* 右侧面板 */
        /* 右侧面板：让图表槽位可伸缩 */
        #rightPane {
            flex: 1;
            padding: 10px;
            overflow: hidden; /* 原来 auto 容易导致尺寸计算怪 */
            display: flex;
            flex-direction: column;
            min-height: 0; /* 关键：允许内部 flex 子项正确收缩/扩展 */
            box-sizing: border-box;
            max-height: 600px;
        }

        /* 地图旁图表槽位：占满右侧剩余高度 */

            flex: 1;
            min-height: 0; /* 关键 */
        }

        /* 下方 stats 的槽位：给一个明确高度（不然 canvas 会卡在初始高度） */
        #statsHistSlot, #statsScatterSlot {
            height: 500px;
            max-height: 100%;
        }

            /* canvas 始终吃满父容器 */
            #dockSlot canvas,
            #statsHistSlot canvas,
            #statsScatterSlot canvas {
                width: 100% !important;
                height: 100% !important;
                display: block;
            }

        /* iframe 自适应 */
        #mapFrame {
            border: none;
            width: 100%;
            height: 100%;
        }

        #CityCountSlot {
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
        }

    <script>
        let chartInstances = [];

        function showMap(mapId) {
            const maps = document.getElementsByClassName('map-frame');
            for (let i = 0; i < maps.length; i++) maps[i].classList.remove('active');
            const map2 = document.getElementById('map2');
            map2.style.display = "none";
            const train_stats = document.getElementById('train-stats');
            train_stats.style.display = "none";
            const travel_stats = document.getElementById('travel-stats');
            travel_stats.style.display = "none";




            if (mapId === "map2") {
                map2.style.display = "flex";
                train_stats.style.display = "block";
                loadStats();
                const ro = new ResizeObserver(() => {
                    // 合并多次变化，避免频繁 resize
                    requestAnimationFrame(resizeAllCharts);
                });

                ["rightPane", "dockSlot", "statsHistSlot", "statsScatterSlot", "map2"].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) ro.observe(el);
                });
                drawDepartChart();
                drawArriveChart();
            } else {
                document.getElementById(mapId).classList.add('active');
            };
            if (mapId === "map1") {
                travel_stats.style.display = "block";
                loadStats_map1();
            };

        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('travel-stats').style.display = 'block';
            loadStats_map1();
        });

        async function loadStats_map1() {
            const chartsData = await (await fetch("data/charts.json")).json();
            drawCityCountChart(chartsData.citycount)
        }

        function drawCityCountChart(data) {
            const canvas = document.getElementById('CityCount');
            if (!canvas) {
                console.error('Canvas element not found');
                return;
            }


            const ctx = canvas.getContext('2d');
            if (window.CityCount instanceof Chart) {
                window.CityCount.destroy();
            }
            const container = document.getElementById('CityCountSlot');

            let alreadyContainer = document.getElementById('button-container');

            if (alreadyContainer) {
                alreadyContainer.remove();
            }
            // 创建按钮容器
            const buttonContainer = document.createElement('div');
            buttonContainer.style.position = 'relative';
            buttonContainer.style.display = 'flex';
            buttonContainer.style.justifyContent = 'center';
            buttonContainer.style.alignItems = 'center';
            buttonContainer.style.marginTop = '10px';
            buttonContainer.style.gap = '20px';
            buttonContainer.id = 'button-container'

            // 创建左移按钮
            const leftButton = document.createElement('button');
            leftButton.innerHTML = '← Prev';
            leftButton.style.padding = '8px 20px';
            leftButton.style.fontSize = '14px';
            leftButton.style.cursor = 'pointer';
            leftButton.style.backgroundColor = '#3b82f6';
            leftButton.style.color = 'white';
            leftButton.style.border = 'none';
            leftButton.style.borderRadius = '5px';
            leftButton.style.transition = 'background-color 0.3s';

            // 创建右移按钮
            const rightButton = document.createElement('button');
            rightButton.innerHTML = 'Next →';
            rightButton.style.padding = '8px 20px';
            rightButton.style.fontSize = '14px';
            rightButton.style.cursor = 'pointer';
            rightButton.style.backgroundColor = '#3b82f6';
            rightButton.style.color = 'white';
            rightButton.style.border = 'none';
            rightButton.style.borderRadius = '5px';
            rightButton.style.transition = 'background-color 0.3s';

            // 添加悬停效果
            leftButton.onmouseover = () => leftButton.style.backgroundColor = '#2563eb';
            leftButton.onmouseout = () => leftButton.style.backgroundColor = '#3b82f6';
            rightButton.onmouseover = () => rightButton.style.backgroundColor = '#2563eb';
            rightButton.onmouseout = () => rightButton.style.backgroundColor = '#3b82f6';

            // 创建位置指示器
            const positionIndicator = document.createElement('span');
            positionIndicator.style.fontSize = '14px';
            positionIndicator.style.color = '#666';
            positionIndicator.style.margin = '0 10px';

            buttonContainer.appendChild(leftButton);
            buttonContainer.appendChild(positionIndicator);
            buttonContainer.appendChild(rightButton);

            // 将按钮容器添加到CityCountSlot后面
            container.parentNode.insertBefore(buttonContainer, container.nextSibling);

            // 验证数据
            if (!data || typeof data !== 'object') {
                console.error('Invalid data: data is null or not an object', data);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '14px Arial';
                ctx.fillStyle = '#666';
                ctx.textAlign = 'center';
                ctx.fillText('no data error', canvas.width / 2, canvas.height / 2);
                return;
            }

            // 存储原始数据和处理后的数据
            let originalData = data;
            let currentVisibleDatasets = {
                on: true,
                off: true
            };

            // 当前滚动位置（单位：城市索引）
            let currentScrollIndex = 0;
            const VISIBLE_CITIES = 15; // 一次显示的城市数量

            // 配置常量
            const CHART_HEIGHT = 450;
            const BAR_WIDTH = 80;           // 每个类别占用的总宽度（像素）
            const BAR_PERCENTAGE = 0.7;      // 柱子占类别宽度的比例

            // 设置canvas尺寸适应容器
            const resizeCanvas = () => {
                const containerWidth = container.clientWidth || 800;

                canvas.width = containerWidth;
                canvas.height = CHART_HEIGHT;
                container.style.height = CHART_HEIGHT + 'px';

                if (window.cityChart) {
                    updateChart();
                }
            };

            // 数据处理：根据当前可见的数据集重新排序
            const processData = (rawData) => {
                try {
                    const cityDataArray = Object.entries(rawData)
                        .map(([city, values]) => {
                            if (!values || typeof values !== 'object') {
                                console.warn(`Invalid data for city: ${city}`, values);
                                return null;
                            }

                            const on = Number(values.on) || 0;
                            const off = Number(values.off) || 0;
                            const total = Number(values.total) || (on + off);

                            return {
                                city: String(city),
                                on: on,
                                off: off,
                                total: total
                            };
                        })
                        .filter(item => item !== null);

                    cityDataArray.forEach(item => {
                        let visibleTotal = 0;
                        if (currentVisibleDatasets.on) visibleTotal += item.on;
                        if (currentVisibleDatasets.off) visibleTotal += item.off;
                        item.sortValue = visibleTotal;
                    });

                    return cityDataArray.sort((a, b) => {
                        if (a.sortValue === 0 && b.sortValue === 0) {
                            return b.total - a.total;
                        }
                        return b.sortValue - a.sortValue;
                    });
                } catch (error) {
                    console.error('Error processing data:', error);
                    return [];
                }
            };

            // 获取当前可见的数据切片
            const getVisibleData = (fullData) => {
                const start = currentScrollIndex;
                const end = Math.min(start + VISIBLE_CITIES, fullData.length);
                return fullData.slice(start, end);
            };

            // 计算当前可见数据的最大值
            const getCurrentMaxValue = (visibleData) => {
                let maxValue = 0;
                visibleData.forEach(item => {
                    let Value = 0;
                    if (currentVisibleDatasets.on) Value += item.on;
                    if (currentVisibleDatasets.off) Value += item.off;
                    maxValue = Math.max(maxValue, Value);
                });
                return maxValue;
            };

            // 更新位置指示器
            const updatePositionIndicator = (totalCities) => {
                const endIndex = Math.min(currentScrollIndex + VISIBLE_CITIES, totalCities);
                positionIndicator.textContent = `Showing ${currentScrollIndex + 1}-${endIndex} /  ${totalCities} cities in total`;

                // 更新按钮状态
                leftButton.disabled = currentScrollIndex === 0;
                rightButton.disabled = endIndex >= totalCities;

                leftButton.style.opacity = leftButton.disabled ? '0.5' : '1';
                leftButton.style.cursor = leftButton.disabled ? 'not-allowed' : 'pointer';
                rightButton.style.opacity = rightButton.disabled ? '0.5' : '1';
                rightButton.style.cursor = rightButton.disabled ? 'not-allowed' : 'pointer';
            };

            // 移动视图
            const moveView = (direction) => {
                const processedData = processData(originalData);
                const maxStartIndex = Math.max(0, processedData.length - VISIBLE_CITIES);

                if (direction === 'left') {
                    currentScrollIndex = Math.max(0, currentScrollIndex - 1);
                } else {
                    currentScrollIndex = Math.min(maxStartIndex, currentScrollIndex + 1);
                }

                // 重新绘制图表
                redrawWithVisibleData(processedData);
                updatePositionIndicator(processedData.length);
            };

            // 使用可见数据重新绘制
            const redrawWithVisibleData = (fullData) => {
                const visibleData = getVisibleData(fullData);
                const cities = visibleData.map(item => item.city);
                const onData = visibleData.map(item => item.on);
                const offData = visibleData.map(item => item.off);

                // 计算当前可见数据的最大值
                const currentMaxValue = getCurrentMaxValue(visibleData);
                // 设置y轴最大值（向上取整到10的倍数再加10）
                const yAxisMax = Math.ceil(currentMaxValue / 10) * 10;

                if (window.cityChart) {
                    window.cityChart.data.labels = cities;
                    window.cityChart.data.datasets[0].data = onData;
                    window.cityChart.data.datasets[1].data = offData;

                    // 动态更新y轴范围
                    window.cityChart.options.scales.y.max = yAxisMax;

                    window.cityChart.update();
                }
            };

            // 按钮点击事件
            leftButton.onclick = () => moveView('left');
            rightButton.onclick = () => moveView('right');

            // 更新图表
            const updateChart = () => {
                try {
                    const processedData = processData(originalData);

                    if (processedData.length === 0) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.font = '14px Arial';
                        ctx.fillStyle = '#666';
                        ctx.textAlign = 'center';
                        ctx.fillText('no cities error', canvas.width / 2, canvas.height / 2);
                        return;
                    }

                    // 重置滚动位置
                    currentScrollIndex = 0;

                    // 获取可见数据
                    const visibleData = getVisibleData(processedData);
                    const cities = visibleData.map(item => item.city);
                    const onData = visibleData.map(item => item.on);
                    const offData = visibleData.map(item => item.off);

                    // 计算当前可见数据的最大值
                    const currentMaxValue = getCurrentMaxValue(visibleData);
                    // 设置y轴最大值（向上取整到10的倍数再加10）
                    const yAxisMax = Math.ceil(currentMaxValue / 10) * 10 + 10;

                    if (window.cityChart) {
                        window.cityChart.data.labels = cities;
                        window.cityChart.data.datasets[0].data = onData;
                        window.cityChart.data.datasets[1].data = offData;
                        window.cityChart.data.datasets[0].hidden = !currentVisibleDatasets.on;
                        window.cityChart.data.datasets[1].hidden = !currentVisibleDatasets.off;

                        // 动态更新y轴范围
                        window.cityChart.options.scales.y.max = yAxisMax;

                        window.cityChart.update();
                    } else {
                        window.cityChart = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: cities,
                                datasets: [
                                    {
                                        label: 'departure',
                                        data: onData,
                                        backgroundColor: '#f97316',
                                        borderColor: '#f97316',
                                        borderWidth: 1,
                                        stack: 'total',
                                        order: 1,
                                        hidden: !currentVisibleDatasets.on,

            // 数据处理：根据当前可见的数据集重新排序
            const processData = (rawData) => {
                try {
                    const cityDataArray = Object.entries(rawData)
                        .map(([city, values]) => {
                            if (!values || typeof values !== 'object') {
                                console.warn(`Invalid data for city: ${city}`, values);
                                return null;
                            }

                            const on = Number(values.on) || 0;
                            const off = Number(values.off) || 0;
                            const total = Number(values.total) || (on + off);

                            return {
                                city: String(city),
                                on: on,
                                off: off,
                                total: total
                            };
                        })
                        .filter(item => item !== null);

                    cityDataArray.forEach(item => {
                        let visibleTotal = 0;
                        if (currentVisibleDatasets.on) visibleTotal += item.on;
                        if (currentVisibleDatasets.off) visibleTotal += item.off;
                        item.sortValue = visibleTotal;
                    });

                    return cityDataArray.sort((a, b) => {
                        if (a.sortValue === 0 && b.sortValue === 0) {
                            return b.total - a.total;
                        }
                        return b.sortValue - a.sortValue;
                    });
                } catch (error) {
                    console.error('Error processing data:', error);

                return fullData.slice(start, end);

            // 计算当前可见数据的最大值
            const getCurrentMaxValue = (visibleData) => {

        async function drawDepartChart() {
            const chartsData = await (await fetch("data/charts.json")).json();

            const hours = chartsData.depart_hours;  // 整数小时分布用

            // -------------------------
            // 1. 转换外部给定最早/最晚时间（含分钟）
            // -------------------------
            function convertHMToFloat(hm) {
                const [h, m] = hm.split(":").map(Number);
                return h + m / 60 - 0.5;
            }

            const earliestFloat = convertHMToFloat(chartsData.earliestdep.time);
            const latestFloat = convertHMToFloat(chartsData.latestdep.time);

            // -------------------------
            // 2. 整点小时分布 bins (0~23)
            // --------------------------
            const bins = new Array(24).fill(0);
            hours.forEach(h => {
                if (h >= 0 && h < 24) bins[h]++;
            });

            // -------------------------
            // 3. 绘图
            // -------------------------
            const ctx = document.getElementById("departChart").getContext("2d");

            if (window.departChart instanceof Chart) {
                window.departChart.destroy();
            }

            window.departChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: [...Array(24).keys()],  // 0~23
                    datasets: [{
                        label: "Departure Count",
                        data: bins
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: { display: true, text: "Departure Time" },
                            min: 0,
                            max: 23
                        },
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: "Count" }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: `Departure Time Distribution`,
                            font: { size: 16, weight: 'bold' },
                            padding: { top: 10, bottom: 20 }
                        },
                        annotation: {
                            annotations: {
                                earliestLine: {
                                    type: "line",
                                    borderColor: "blue",
                                    borderWidth: 2,
                                    value: earliestFloat,
                                    scaleID: "x",
                                    label: {
                                        content: [
                                            `Earliest：${chartsData.earliestdep.time}`,
                                            `Train：${chartsData.earliestdep.train}`,

        function getTrainGroup(train) {
            if (/^[A-Za-z]/.test(train)) {

        function drawHistogram(durations, distances) {
            // 1. 初始化 bins（0~600 每 30 一箱，总共 21 个箱）
            const binSize1 = 30;
            const maxBin1 = 600;
            const bins1 = new Array(maxBin1 / binSize1 + 1).fill(0); // 600/30=20→21个bin

            // 2. 填充数据
            durations.forEach(d => {
                if (d >= maxBin1) {
                    bins1[bins1.length - 1]++;    // 溢出箱
                } else {
                    const index = Math.floor(d / binSize1);
                    bins1[index]++;
                }
            });

            // 3. 构建 x 轴区间标签，例如 "0-30" "30-60" ... "570–600" "600+"
            const labels1 = [];
            for (let i = 0; i < bins1.length - 1; i++) {
                labels1.push(`${i * binSize1}-${(i + 1) * binSize1}`);
            }
            labels1.push("600+");

            // distance
            // 1. 初始化 bins（0~2000 每 100 一箱，总共 21 个箱）
            const binSize2 = 100;
            const maxBin2 = 2000;
            const bins2 = new Array(maxBin2 / binSize2 + 1).fill(0); // 2000/100=20→21个bin

            // 2. 填充数据
            distances.forEach(d => {
                if (d >= maxBin2) {
                    bins2[bins2.length - 1]++;    // 溢出箱
                } else {
                    const index = Math.floor(d / binSize2);
                    bins2[index]++;
                }
            });

            // 3. 构建 x 轴区间标签
            const labels2 = [];
            for (let i = 0; i < bins2.length - 1; i++) {
                labels2.push(`${i * binSize2}-${(i + 1) * binSize2}`);
            }
            labels2.push("2000+");



            // 4. 绘图
            const ctx = document.getElementById("histogramChart").getContext("2d");

            if (window.histChart) window.histChart.destroy();

            // bins1/labels1: 第一个直方图
            // bins2/labels2: 第二个直方图

            window.histChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    datasets: [
                        {
                            label: "Travel Duration",
                            data: labels1.map((lab, i) => ({ x: lab, y: bins1[i] })),
                            xAxisID: 'x1',
                            yAxisID: 'y1',
                            borderWidth: 1
                        },
                        {
                            label: "Travel Distance",
                            data: labels2.map((lab, i) => ({ x: lab, y: bins2[i] })),
                            xAxisID: 'x2',
                            yAxisID: 'y2',
                            borderWidth: 1,
                            hidden: true   // 默认先隐藏第二个
                        }

                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    parsing: false, // 因为我们用 {x,y} 形式
                    scales: {
                        x1: {
                            type: 'category',
                            labels: labels1,
                            display: true,
                            title: { display: true, text: "Time (min)" }
                        },
                        y1: {
                            beginAtZero: true,
                            display: true,
                            title: { display: true, text: "Count (Chart 1)" }
                        },
                        x2: {
                            type: 'category',
                            labels: labels2,
                            display: false, // 默认隐藏（因为 dataset2 默认 hidden）
                            title: { display: true, text: "Distance (km)" }
                        },
                        y2: {
                            beginAtZero: true,
                            display: false,
                            position: 'right',
                            title: { display: true, text: "Count (Chart 2)" }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: `Distance and Duration Histogram`,
                            font: { size: 16, weight: 'bold' },
                            padding: { top: 10, bottom: 20 }
                        },
                        legend: {
                            onClick: (e, legendItem, legend) => {
                                const chart = legend.chart;
                                const clicked = legendItem.datasetIndex;

                                // 只保留被点击的那个 dataset 显示
                                chart.data.datasets.forEach((ds, i) => {
                                    ds.hidden = (i !== clicked) ? true : !ds.hidden; // 再点一次可隐藏它自己
                                });

                                // 根据当前显示的 dataset 来切换轴显示
                                const show1 = !chart.data.datasets[0].hidden;
                                const show2 = !chart.data.datasets[1].hidden;

                                chart.options.scales.x1.display = show1;
                                chart.options.scales.y1.display = show1;
                                chart.options.scales.x2.display = show2;
                                chart.options.scales.y2.display = show2;

                                chart.update();
                            }
                        },
                        tooltip: {
                            enabled: true,
                            mode: 'nearest',
                            intersect: true,

                            callbacks: {
                                // 1) 标题：默认一般就是 x 轴对应的 label
                                title: (items) => {
                                    if (!items.length) return '';
                                    const item = items[0];
                                    label = item.label;
                                    //const start, end;
                                    if (label.endsWith('+')) {
                                        start = Number(label.slice(0, -1));
                                        end = 999999;
                                    }
                                    else[start, end] = label.split('-').map(Number);



                                    const dsLabel = item.dataset?.label ?? '';


                                    const mapFrame = document.getElementById("mapFrame");
                                    mapFrame.contentWindow.postMessage({
                                        type: dsLabel,
                                        start: start,
                                        end: end
                                    }, "*");


                                    return item.label ?? (item.raw && item.raw.x != null ? String(item.raw.x) : '');
                                },

                                // 2) 每一行：默认是 "Dataset Label: Value"
                                label: (item) => {
                                    const dsLabel = item.dataset?.label ?? '';

                                    // Chart.js 已经帮你格式化了数字 -> formattedValue
                                    const value = item.formattedValue ?? '';

                                    // 默认如果 dsLabel 为空就只显示 value
                                    return dsLabel ? `${dsLabel}: ${value}` : `${value}`;
                                },

                                // 3) 颜色小方块/marker对应的文字（一般不需要改，保持默认即可）
                                labelColor: (item) => {
                                    const style = item.chart.getDatasetMeta(item.datasetIndex).controller.getStyle(item.dataIndex);
                                    return {
                                        borderColor: style.borderColor,
                                        backgroundColor: style.backgroundColor,
                                        borderWidth: style.borderWidth,
                                        borderDash: style.borderDash,
                                        borderDashOffset: style.borderDashOffset,
                                        borderRadius: 0,
                                    };
                                },

                                // 4) 其他默认回调：不写就是空（相当于默认）
                                // afterLabel: () => '',
                                // footer: () => ''
                            }
                        }
                    }
                }
            });
        }
        function switchScatter() {
            const chart = window.scatterChart;
            const axistext = chart.options.scales?.x?.title?.text;
            if (axistext === "departure time") {

                    drawThirdScatter();

            slot.appendChild(canvas);

        function showDockedChart(which) {
            const dockSlot = document.getElementById("dockSlot");
            const statsSlot = document.getElementById("statsHistSlot");  // 统一用一个下方槽位
            const statsHint = document.getElementById("statsHint");

            if (!dockSlot || !statsSlot || !statsHint) return;

            statsHint.innerHTML = "";

            if (which === "scatter") {
                // scatter -> 右侧；histogram -> 下方（真正交换）
                moveCanvasTo("scatterChart", "dockSlot");
                moveCanvasTo("histogramChart", "statsHistSlot");

                statsHint.innerHTML = `<button id="bringHistUpBtn">⬆️ Put Histogram beside the map</button>`;
                document.getElementById("bringHistUpBtn").onclick = () => showDockedChart("hist");
                document.getElementById("switchScatter").style.display = "block";
            } else {
                // histogram -> 右侧；scatter -> 下方（真正交换）
                moveCanvasTo("histogramChart", "dockSlot");
                moveCanvasTo("scatterChart", "statsHistSlot");

                statsHint.innerHTML = `<button id="bringScatterUpBtn">⬆️ Put Scatter beside the map</button>
                                        <button id="switchScatterBtn">Switch Scatter</button>`;
                document.getElementById("bringScatterUpBtn").onclick = () => showDockedChart("scatter");
                document.getElementById("switchScatterBtn").onclick = () => switchScatter();
                document.getElementById("switchScatter").style.display = "none";
            };

            requestAnimationFrame(resizeAllCharts);
        }

        // 绑定右侧两个按钮
        document.getElementById("showScatterBtn")?.addEventListener("click", () => showDockedChart("scatter"));
        document.getElementById("showHistBtn")?.addEventListener("click", () => showDockedChart("hist"));
        document.getElementById("switchScatter")?.addEventListener("click", () => switchScatter());

        const divider = document.getElementById("divider");
        const leftPane = document.getElementById("leftPane");
        const toggleBtn = document.getElementById("toggleBtn");
        const dragMask = document.getElementById("dragMask");

        let isDragging = false;

        // 拖动开始
        divider.addEventListener("mousedown", (e) => {
            isDragging = true;
            dragMask.style.display = "block";   // ⬅️ 启动遮罩层
        });

        // 拖动中
        document.addEventListener("mousemove", (e) => {
            if (!isDragging) return;

            const newWidth = e.clientX;
            if (newWidth > 0 && newWidth < window.innerWidth) {
                leftPane.style.width = newWidth - 5 + "px";
            }
            if (newWidth > window.innerWidth - 500) {
                rightPane.style.display = "none";
            }
            else rightPane.style.display = "flex";
        });

        // 拖动结束
        document.addEventListener("mouseup", (e) => {
            isDragging = false;
            dragMask.style.display = "none"; // ⬅️ 关闭遮罩层
            resizeAllCharts();
        });


        // 折叠 / 展开
        toggleBtn.addEventListener("click", () => {
            if (leftPane.classList.contains("collapsed")) {
                leftPane.classList.remove("collapsed");
                leftPane.style.width = "100%";
                rightPane.style.display = "none";
                toggleBtn.textContent = "⮜";
            } else {
                leftPane.classList.add("collapsed");
                leftPane.style.width = 0;
                rightPane.style.display = "flex";
                toggleBtn.textContent = "⮞";
            }
            requestAnimationFrame(resizeAllCharts);
        });

        function resizeAllCharts() {
            if (window.scatterChart instanceof Chart) {
                window.scatterChart.maintainAspectRatio = false;
                window.scatterChart.resize();
            }
            if (window.histChart instanceof Chart) {
                window.histChart.maintainAspectRatio = false;
                window.histChart.resize();
            }
        }
    </script>
