    <!-- Google fonts-->

    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap"

    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap"

    <!-- Chinese fonts (only used in 中文 mode) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&amp;family=Noto+Serif+SC:wght@500;600;700&amp;display=swap"

    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Language toggle button styling -->
    <style>
        #lang-toggle,
        #print-btn {
            cursor: pointer;
            border: 1px solid currentColor;
            border-radius: 999px;
            padding: 0.15rem 0.85rem;
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        #lang-toggle { min-width: 3.2rem; }
        #print-btn { margin-right: 0.5rem; }
        #lang-toggle:hover,
        #print-btn:hover {
            background-color: rgba(0, 0, 0, 0.06);
        }

        /* ===== 中文字体（仅在中文模式下生效，英文模式不受影响）===== */
        /* 正文用黑体 Noto Sans SC */
        html[lang="zh-CN"] body,
        html[lang="zh-CN"] .main-body,
        html[lang="zh-CN"] .navbar,
        html[lang="zh-CN"] p,
        html[lang="zh-CN"] li,
        html[lang="zh-CN"] a,
        html[lang="zh-CN"] span,
        html[lang="zh-CN"] td,
        html[lang="zh-CN"] th {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Mulish", sans-serif;
        }
        /* 标题用宋体 Noto Serif SC，呼应原本英文标题的衬线风格 */
        html[lang="zh-CN"] h1,
        html[lang="zh-CN"] h2,
        html[lang="zh-CN"] h3,
        html[lang="zh-CN"] h4,
        html[lang="zh-CN"] h5,
        html[lang="zh-CN"] h6,
        html[lang="zh-CN"] .font-alt {
            font-family: "Noto Serif SC", "Newsreader", "Songti SC", serif;
        }

        /* ===== 打印 / 导出 PDF 样式 ===== */
        @media print {
            @page { margin: 14mm; }
            /* 隐藏导航、按钮、顶部大图、头像和页脚 */
            #mainNav,
            .top-section,
            #avatar,
            footer,
            #lang-toggle,
            #print-btn {
                display: none !important;
            }
            /* 去掉渐变/深色背景，统一白底黑字，节省墨水 */
            body {
                background: #fff !important;
                color: #000 !important;
                padding-top: 0 !important;
            }
            section {
                background: #fff !important;
                margin: 0 !important;
                padding-top: 0.4rem !important;
                padding-bottom: 0.4rem !important;
            }
            section, .main-body, p, li, code,
            h1, h2, h3, h4, h5, h6, a, span, td, th {
                color: #000 !important;
            }
            a { text-decoration: none !important; }
            .container { max-width: 100% !important; width: 100% !important; }
            /* 标题和条目尽量不被分页截断 */
            h1, h2, h3, h4, h5, h6 { page-break-after: avoid; }
            .main-body > * { page-break-inside: avoid; }
        }
    </style>

    <!-- Bootstrap core JS-->

    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        // See https://docs.mathjax.org/en/latest/index.html for more details.
        MathJax = {
            tex: {
                packages: {},              // extensions to use
                inlineMath: [              // start/end delimiter pairs for in-line math
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [             // start/end delimiter pairs for display math
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: false,      // use \$ to produce a literal dollar sign
                processEnvironments: true, // process \begin{xxx}...\end{xxx} outside math mode
                processRefs: true,         // process \ref{...} outside of math mode
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,    // pattern for recognizing numbers
                tags: 'all',              // or 'ams' or 'all'
                tagSide: 'right',          // side for \tag macros
                tagIndent: '0.8em',        // amount to indent tags
                useLabelIds: true,         // use label name rather than tag for ids
                maxMacros: 10000,          // maximum number of macro substitutions per expression
                maxBuffer: 5 * 1024,       // maximum size for the internal TeX string (5K)
                // baseURL:                   // URL for use with links to tags (when there is a <base> tag in effect)
                // (document.getElementsByTagName('base').length === 0) ? '' : String(document.location).replace(/#.*$/, ''),
                formatError:               // function called when TeX syntax errors occur
                    (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script"
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

    <!-- Bilingual (EN / 中文) loader & toggle -->
    <script type="text/javascript" src="static/js/i18n.js"></script>

</head>
